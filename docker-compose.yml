services:
  db:
    image: postgres:15
    container_name: todo-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    volumes:
      - todo-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: todo-app-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@todo-app-db:5432/todo
      JWT_SECRET: "jwt-super-secret-change-in-production"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: todo-app-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  todo-pgdata:
    name: todo-pgdata
